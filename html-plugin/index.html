<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Plugin</title>
  <script src="https://www.coursera.org/widget/coursera-widget-connect-v0.js"></script>
</head>
<body>
  <div id="content">
    <p style="color: #999; font-size: 14px;">Loading...</p>
  </div>
  <div id="debug" style="margin-top: 20px; padding: 12px; background: #f5f5f5; font-size: 12px; font-family: monospace;"></div>

  <script>
    function log(msg) {
      document.getElementById('debug').innerHTML += '<div>' + msg + '</div>';
    }

    function render(config) {
      log('render called with: ' + JSON.stringify(config));
      document.getElementById('content').innerHTML = config.html;
    }

    log('Script started');
    log('CourseraWidget exists: ' + (typeof window.CourseraWidget !== 'undefined'));

    window.onload = function() {
      log('window.onload fired');
      log('CourseraWidget now: ' + (typeof window.CourseraWidget !== 'undefined'));

      if (window.CourseraWidget) {
        log('Registering configuration listener');
        CourseraWidget.on('configuration', function(config) {
          log('Configuration received!');
          render(config);
        });
      } else {
        log('CourseraWidget not found - using fallback');
        render({
          html: "<h2>Hello from the HTML plugin</h2><p>Replace this with your generated HTML content.</p>"
        });
      }
    };
  </script>
</body>
</html>
