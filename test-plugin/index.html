<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accordion Plugin</title>
  <script src="https://www.coursera.org/widget/coursera-widget-connect-v0.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      max-width: 680px;
      margin: 0 auto;
      color: #333;
    }
    h2 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 16px;
    }
    .accordion-item {
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .accordion-header {
      background: #f5f5f5;
      padding: 14px 16px;
      cursor: pointer;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .accordion-header:hover { background: #ebebeb; }
    .accordion-body {
      padding: 0 16px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }
    .accordion-body.open {
      max-height: 200px;
      padding: 14px 16px;
    }
    .arrow { transition: transform 0.3s ease; }
    .arrow.open { transform: rotate(180deg); }
  </style>
</head>
<body>
  <div id="accordion-container">
    <p style="color: #999; font-size: 14px;">Loading...</p>
  </div>

  <script>
    function toggle(header) {
      const body = header.nextElementSibling;
      const arrow = header.querySelector('.arrow');
      body.classList.toggle('open');
      arrow.classList.toggle('open');
    }

    function render(config) {
      const container = document.getElementById('accordion-container');
      
      let html = '';
      if (config.title) {
        html += '<h2>' + config.title + '</h2>';
      }

      if (config.items && config.items.length > 0) {
        config.items.forEach(function(item) {
          html += '<div class="accordion-item">';
          html += '<div class="accordion-header" onclick="toggle(this)">';
          html += item.header;
          html += '<span class="arrow">▼</span>';
          html += '</div>';
          html += '<div class="accordion-body">' + item.body + '</div>';
          html += '</div>';
        });
      }

      container.innerHTML = html;
    }

    window.onload = function() {
      if (window.CourseraWidget) {
        CourseraWidget.on('configuration', function(config) {
          render(config);
        });
      } else {
        render({
          title: "Key Terms: Artificial Intelligence",
          items: [
            {
              header: "Machine Learning",
              body: "A type of AI where systems learn from data to improve their performance over time."
            }
          ]
        });
      }
    };
  </script>
</body>
</html>
