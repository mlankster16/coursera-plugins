<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Plugin</title>
  <script src="https://www.coursera.org/widget/coursera-widget-connect-v0.js"></script>
</head>
<body>
  <div id="content">
    <p style="color: #999; font-size: 14px;">Loading...</p>
  </div>

  <script>
    courseraApi.callMethod({
      type: 'GET_SESSION_CONFIGURATION',
      data: {},
      onSuccess: function(config) {
        if (config && config.html) {
          document.getElementById('content').innerHTML = config.html;
        } else {
          document.getElementById('content').innerHTML = '<p>No content configured yet.</p>';
        }
      },
      onError: function(err) {
        document.getElementById('content').innerHTML = '<p>Error loading content.</p>';
      }
    });
  </script>
</body>
</html>
